name: Build Production APK and AAB with Web URL

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'AFUMA Vault'
      package_name:
        description: 'پیکیج آئی ڈی درج کریں'
        required: true
        default: 'com.afuma.vault'
      web_url:
        description: 'اپنے بلاگر یا ویب سائٹ کا مکمل لنک (URL) یہاں ڈالیں'
        required: true
        default: 'https://yourbloggerlink.blogspot.com'
      version_code:
        description: 'ورژن کوڈ لکھیں (ہر بار نمبر بڑھائیں، جیسے 2، 3)'
        required: true
        default: '2'
      version_name:
        description: 'ورژن کا نام لکھیں'
        required: true
        default: '1.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Folders
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/xml
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

      - name: Create Icon
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#2563EB" android:pathData="M54,54m-30,0a30,30 0,1 1,60 0a30,30 0,1 1,-60 0"/></vector>
          EOF

      - name: Create File Provider XML (For Sharing and PDF)
        run: |
          cat << 'EOF' > app/src/main/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external_files" path="." />
              <cache-path name="cache_files" path="." />
          </paths>
          EOF

      - name: Generate Java Main (Fixed Share, Upload, and PDF)
        run: |
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          cat << 'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          package ${{ github.event.inputs.package_name }};
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private WebView myWebView;
              private ValueCallback<Uri[]> uploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  myWebView = new WebView(this);
                  WebSettings settings = myWebView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setDatabaseEnabled(true);
                  settings.setJavaScriptCanOpenWindowsAutomatically(true);

                  myWebView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          // Fix: WhatsApp handling without crashing the share menu
                          if (url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "WhatsApp Not Installed", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          // Fix: Opening PDFs and external files in system viewer
                          if (url.endsWith(".pdf") || url.contains("docs.google.com")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  return false;
                              }
                          }
                          return false;
                      }
                  });

                  myWebView.setWebChromeClient(new WebChromeClient() {
                      // Fix: Native image and file upload support
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (uploadMessage != null) uploadMessage.onReceiveValue(null);
                          uploadMessage = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILECHOOSER_RESULTCODE);
                          } catch (Exception e) {
                              uploadMessage = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  // Directly load your Blogger or Website link provided in GitHub Actions input
                  myWebView.loadUrl("${{ github.event.inputs.web_url }}");
                  setContentView(myWebView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE && uploadMessage != null) {
                      uploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data));
                      uploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) myWebView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Generate Manifest with Full Permissions
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              
              <application android:label="${{ github.event.inputs.app_name }}" android:icon="@drawable/ic_launcher" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="android.support.v4.content.FileProvider"
                      android:authorities="${{ github.event.inputs.package_name }}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.file_provider_paths"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

      - name: Generate Security Keystore
        run: |
          keytool -genkey -v -keystore app/release.keystore -alias "afumakey" -keyalg RSA -keysize 2048 -validity 10000 -storepass "AfumaVault123" -keypass "AfumaVault123" -dname "CN=Afuma, OU=Gallery, O=Vault, L=Lahore, S=Punjab, C=PK"

      - name: Gradle System Configuration
        run: |
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; rootProject.name = 'afuma-app'; include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdk 34
              signingConfigs { 
                  release { 
                      storeFile file("release.keystore")
                      storePassword "AfumaVault123"
                      keyAlias "afumakey"
                      keyPassword "AfumaVault123"
                  } 
              }
              defaultConfig { 
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
          }
          EOF

      - name: Build Official Clean Signed Files
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew clean :app:bundleRelease :app:assembleRelease

      - name: Save Both Final Files (APK & AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Afuma_Blogger_Linked_Files
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
