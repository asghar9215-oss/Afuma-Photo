name: Build Both APK and AAB Files

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'Afuma Photo Gallery'
      package_name:
        description: 'پیکیج آئی ڈی (com.afuma.gallery)'
        required: true
        default: 'com.afuma.photogallery'
      version_code:
        description: 'ورژن کوڈ لکھیں'
        required: true
        default: '1'
      version_name:
        description: 'ورژن کا نام لکھیں'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Folders
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"
          cp index.html app/src/main/assets/index.html

      - name: Create Icon
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#2563EB" android:pathData="M54,54m-30,0a30,30 0,1 1,60 0a30,30 0,1 1,-60 0"/></vector>
          EOF

      - name: Generate Java Main
        run: |
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          cat << 'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          package ${{ github.event.inputs.package_name }};
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private WebView myWebView;
              private ValueCallback<Uri[]> uploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  myWebView = new WebView(this);
                  WebSettings settings = myWebView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);

                  myWebView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                              try {
                                  startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "WhatsApp Not Installed", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          return false;
                      }
                  });

                  myWebView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (uploadMessage != null) uploadMessage.onReceiveValue(null);
                          uploadMessage = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILECHOOSER_RESULTCODE);
                          } catch (Exception e) {
                              uploadMessage = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  myWebView.loadUrl("file:///android_asset/index.html");
                  setContentView(myWebView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE && uploadMessage != null) {
                      uploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data));
                      uploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) myWebView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Generate Manifest
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="${{ github.event.inputs.app_name }}" android:icon="@drawable/ic_launcher" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate Security Keystore (For Play Store & Safe Install)
        run: |
          keytool -genkey -v -keystore app/release.keystore -alias "afumakey" -keyalg RSA -keysize 2048 -validity 10000 -storepass "AfumaVault123" -keypass "AfumaVault123" -dname "CN=Afuma, OU=Gallery, O=Vault, L=Lahore, S=Punjab, C=PK"
          keytool -export -rfc -keystore app/release.keystore -alias "afumakey" -file app/upload_certificate.pem -storepass "AfumaVault123"

      - name: Gradle System Configuration
        run: |
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; rootProject.name = 'afuma-app'; include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdk 34
              signingConfigs { 
                  release { 
                      storeFile file("release.keystore")
                      storePassword "AfumaVault123"
                      keyAlias "afumakey"
                      keyPassword "AfumaVault123"
                  } 
              }
              defaultConfig { 
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
          }
          EOF

      - name: Build Official Signed AAB and APK Files
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:bundleRelease :app:assembleRelease

      - name: Save Both Final Files (APK & AAB + Keystore)
        uses: actions/upload-artifact@v4
        with:
          name: Afuma_Official_Production_Files
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/release.keystore
            app/upload_certificate.pem
