name: Build Android Master Webview App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'Afuma Photo'
      package_name:
        description: 'پیکیج کا نام (com.example.app)'
        required: true
        default: 'com.afuma.photo'
      version_code:
        description: 'ورژن کوڈ لکھیں'
        required: true
        default: '10002'
      version_name:
        description: 'ورژن کا نام لکھیں'
        required: true
        default: '1.0.2'
      blogger_url:
        description: 'اپنے بلاگر یا ایپ کا لائیو لنک یہاں پیسٹ کریں'
        required: true
        default: 'https://ceakle.blogspot.com/?m=1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Project Directory
        run: |
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

      - name: Generate High Quality XML App Icon
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#2563EB"
                  android:pathData="M54,54m-30,0a30,30 0,1 1,60 0a30,30 0,1 1,-60 0"/>
          </vector>
          EOF

      - name: Generate Android Native Java Source Code
        run: |
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          cat << 'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          package ${{ github.event.inputs.package_name }};

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.webkit.URLUtil;
          import android.os.Build;
          import android.os.Environment;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.widget.Toast;
          import android.print.PrintAttributes;
          import android.print.PrintDocumentAdapter;
          import android.print.PrintManager;

          public class MainActivity extends Activity {
              private WebView myWebView;
              private ValueCallback<Uri[]> uploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      requestPermissions(new String[]{
                              "android.permission.ACCESS_FINE_LOCATION",
                              "android.permission.ACCESS_COARSE_LOCATION",
                              "android.permission.CAMERA",
                              "android.permission.WRITE_EXTERNAL_STORAGE",
                              "android.permission.READ_EXTERNAL_STORAGE"
                      }, 1);
                  }

                  myWebView = new WebView(this);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setGeolocationEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  webSettings.setAllowContentAccess(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false);

                  myWebView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url == null) return false;
                          if (url.startsWith("tel:") || url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me") || url.startsWith("geo:")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  return false;
                              }
                          }
                          return false;
                      }
                  });

                  myWebView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          uploadMessage = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          startActivityForResult(intent, FILECHOOSER_RESULTCODE);
                          return true;
                      }
                  });

                  // 🔗 اینڈرائیڈ نیٹیو شیئرنگ انجن انٹرپریٹر (بائی پاسز ال براؤزر بلاکنگ)
                  myWebView.addJavascriptInterface(new Object() {
                      @android.webkit.JavascriptInterface
                      public void shareText(String text) {
                          Intent sendIntent = new Intent();
                          sendIntent.setAction(Intent.ACTION_SEND);
                          sendIntent.putExtra(Intent.EXTRA_TEXT, text);
                          sendIntent.setType("text/plain");
                          Intent shareIntent = Intent.createChooser(sendIntent, "Share via");
                          startActivity(shareIntent);
                      }
                  }, "AndroidShare");

                  myWebView.loadUrl("${{ github.event.inputs.blogger_url }}");
                  setContentView(myWebView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE && uploadMessage != null) {
                      uploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data));
                      uploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) myWebView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Generate Android Manifest File
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:label="${{ github.event.inputs.app_name }}"
                  android:icon="@drawable/ic_launcher_foreground"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate Permanent Master Keystore and Export Pem
        run: |
          keytool -genkey -v -keystore app/afumaphoto_master.keystore -alias "${{ secrets.KEY_ALIAS }}" -keyalg RSA -keysize 2048 -validity 10000 -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -dname "CN=StyleLink, OU=App, O=afumaphoto, L=Lahore, S=Punjab, C=PK"
          keytool -export -rfc -keystore app/afumaphoto_master.keystore -alias "${{ secrets.KEY_ALIAS }}" -file app/upload_certificate.pem -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Generate Build Gradle Configuration
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "stylelink-afumaphoto"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdk 35
              signingConfigs { 
                  release { 
                      storeFile file("afumaphoto_master.keystore")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEY_PASSWORD }}"
                  } 
              }
              defaultConfig { 
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 24
                  targetSdk 35
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
          }
          EOF
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties

      - name: Build Official Signed AAB and APK Files
        run: |
          export GRADLE_USER_HOME=$HOME/.gradle_clean
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:bundleRelease :app:assembleRelease --no-build-cache

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: afumaphoto_Final_Release_Files
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/upload_certificate.pem
