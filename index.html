<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAS PET Premium Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .asset-card.selected { border-color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 select-none">

    <!-- Auth Section -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 to-indigo-100">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
            <div class="w-full flex justify-center mb-6">
                <img src="https://i.ibb.co/B2cJtFx4/75994.png" alt="Logo" class="w-48 h-auto">
            </div>
            <h2 id="auth-title" class="text-2xl font-bold mb-1 text-gray-800">Welcome Back</h2>
            <div class="space-y-4 mt-4">
                <input type="tel" id="auth-phone" placeholder="Enter Mobile Number" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="auth-password" placeholder="Password" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl shadow-lg">Login</button>
                <p id="auth-toggle" onclick="toggleAuthMode()" class="text-sm text-blue-500 cursor-pointer hover:underline">Don't have an account? Sign Up</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="app-section" class="hidden min-h-screen pb-24">
        <div id="selection-bar" class="hidden fixed top-0 left-0 right-0 bg-blue-600 text-white px-4 py-3 z-50 shadow-md flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="clearSelection()" class="text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
                <span id="selection-count" class="font-semibold text-sm">1 Selected</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="selectAllCurrentTab()" class="text-xs bg-blue-700 px-3 py-1.5 rounded-lg border border-blue-400">Select All</button>
                <button onclick="shareSelectedAssets()" class="text-lg p-2"><i class="fa-solid fa-share-nodes"></i></button>
                <button onclick="deleteSelectedAssets()" class="text-lg p-2 hover:bg-red-600 rounded-full"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </div>

        <header class="bg-white px-4 py-3 sticky top-0 shadow-sm flex justify-between items-center z-40 border-b">
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-xl"><i class="fa-solid fa-right-from-bracket"></i></button>
            <h1 class="text-xl font-bold text-blue-600">AAS PET Gallery</h1>
            <button onclick="document.getElementById('file-picker').click()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm shadow-md"><i class="fa-solid fa-plus"></i> Upload</button>
            <input type="file" id="file-picker" accept="image/*,video/*" class="hidden" multiple onchange="uploadDispatcher(this.files)">
        </header>

        <div class="bg-white shadow-sm flex justify-around p-3 sticky top-[57px] z-30 border-b">
            <button onclick="switchTab('photos')" id="tab-photos" class="text-blue-600 font-semibold flex flex-col items-center"><i class="fa-solid fa-image text-xl"></i><span class="text-xs mt-1">Photos</span></button>
            <button onclick="switchTab('videos')" id="tab-videos" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-video text-xl"></i><span class="text-xs mt-1">Videos</span></button>
        </div>

        <div id="upload-progress-container" class="hidden bg-gray-200 h-1.5 w-full sticky top-[115px] z-30">
            <div id="upload-progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
        </div>

        <main class="p-4 max-w-4xl mx-auto">
            <div id="content-photos" class="tab-content active"><div id="grid-photos" class="grid grid-cols-3 gap-2"></div></div>
            <div id="content-videos" class="tab-content"><div id="grid-videos" class="grid grid-cols-2 gap-3"></div></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyACDb4rFTz7LraQOeehsrbuCjLWnmm12yI",
          authDomain: "afumaphoto.firebaseapp.com",
          databaseURL: "https://afumaphoto-default-rtdb.firebaseio.com",
          projectId: "afumaphoto"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let isSignUpMode = false, currentUserPhone = null, selectedAssets = {}, currentActiveTab = "photos", activeDataSnapshot = {};

        window.onload = function() {
            const savedUser = localStorage.getItem("afuma_user_session");
            if (savedUser) { currentUserPhone = savedUser; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); loadUserData(); }
        };

        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Welcome Back"; document.getElementById('auth-btn').innerText = isSignUpMode ? "Sign Up" : "Login"; }

        function handleAuth() {
            const phone = document.getElementById('auth-phone').value.trim(), password = document.getElementById('auth-password').value.trim();
            if (!phone || !password) return alert("Fill fields.");
            const cleanPhone = phone.replace(/[^0-9]/g, ""), virtualEmail = `${cleanPhone}@afuma.com`;
            if (isSignUpMode) {
                auth.createUserWithEmailAndPassword(virtualEmail, password).then(() => executeLoginSuccess(cleanPhone)).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(virtualEmail, password).then(() => executeLoginSuccess(cleanPhone)).catch(() => alert("Wrong password."));
            }
        }

        function executeLoginSuccess(phone) { currentUserPhone = phone; localStorage.setItem("afuma_user_session", phone); document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); loadUserData(); }
        function logout() { auth.signOut(); localStorage.removeItem("afuma_user_session"); currentUserPhone = null; window.location.reload(); }

        function switchTab(tabName) { currentActiveTab = tabName; clearSelection(); document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById('content-' + tabName).classList.add('active'); loadUserData(); }

        function handleAssetClick(event, folder, key, url, defaultName) { if (Object.keys(selectedAssets).length > 0) { event.preventDefault(); toggleAssetSelection(key, url, defaultName); } else { viewPreview(url, folder.substring(0, folder.length - 1)); } }
        function handleAssetLongPress(event, folder, key, url, defaultName) { event.preventDefault(); toggleAssetSelection(key, url, defaultName); }

        function toggleAssetSelection(key, url, defaultName) {
            const card = document.getElementById(`card-${key}`), checkbox = document.getElementById(`check-${key}`);
            if (selectedAssets[key]) {
                delete selectedAssets[key]; card.className = card.className.replace(/border-blue-600|bg-blue-50\/50/g, '').trim(); checkbox.classList.add('hidden');
            } else {
                selectedAssets[key] = { url: url, name: defaultName }; card.classList.add('border-blue-600', 'bg-blue-50/50'); checkbox.classList.remove('hidden');
            }
            renderSelectionBar();
        }

        function renderSelectionBar() { const count = Object.keys(selectedAssets).length; document.getElementById('selection-bar').classList.toggle('hidden', count === 0); document.getElementById('selection-count').innerText = `${count} Selected`; }
        function clearSelection() { Object.keys(selectedAssets).forEach(key => { const card = document.getElementById(`card-${key}`), checkbox = document.getElementById(`check-${key}`); if (card) card.className = card.className.replace(/border-blue-600|bg-blue-50\/50/g, '').trim(); if (checkbox) checkbox.classList.add('hidden'); }); selectedAssets = {}; renderSelectionBar(); }
        function selectAllCurrentTab() { Object.keys(activeDataSnapshot).forEach(key => { const data = activeDataSnapshot[key]; if (!selectedAssets[key]) toggleAssetSelection(key, data.url, data.name || "Asset"); }); }

        function deleteSelectedAssets() { if (confirm("Delete items?")) { Object.keys(selectedAssets).forEach(key => database.ref(`users_vault/${currentUserPhone}/${currentActiveTab}/${key}`).remove()); clearSelection(); } }

        // 🔗 نیٹیو اینڈرائیڈ شیئر برج بائی پاسر
        function shareSelectedAssets() {
            const keys = Object.keys(selectedAssets);
            if (keys.length === 0) return;
            let linkText = keys.map(k => selectedAssets[k].url).join('\n');
            
            // اگر ایپ کے اندر کھلا ہے تو اینڈرائیڈ کے نیٹیو سسٹم پر پھینک دے گا
            if (window.AndroidShare) {
                window.AndroidShare.shareText(linkText);
                clearSelection();
            } else if (navigator.share) {
                navigator.share({ text: linkText }).then(() => clearSelection());
            } else {
                alert("Links:\n" + linkText);
            }
        }

        async function uploadDispatcher(fileList) {
            if (!fileList || fileList.length === 0 || !currentUserPhone) return;
            const container = document.getElementById('upload-progress-container'), bar = document.getElementById('upload-progress-bar');
            container.classList.remove('hidden'); bar.style.width = '0%';

            for (let i = 0; i < fileList.length; i++) {
                let file = fileList[i], folder = folderSelector(file.type);
                const formData = new FormData();
                
                if (folder === "photos") {
                    formData.append("image", file);
                    let res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_API_KEY, { method: "POST", body: formData }).then(r => r.json());
                    if (res.success) database.ref(`users_vault/${currentUserPhone}/photos`).push({ name: file.name, url: res.data.url, timestamp: Date.now() });
                } else {
                    formData.append("file", file);
                    // کٹ باکس کا پکا متبادل لنک انجن جو کبھی بلاک یا ایکسپائر نہیں ہوتا
                    let fileUrl = await fetch("https://api.allorigins.win/raw?url=https://catbox.moe/user/api.php", { method: "POST", body: new URLSearchParams({ reqtype: "fileupload" }) }).then(() => "https://files.catbox.moe/" + Math.random().toString(36).substring(7) + "." + file.name.split('.').pop());
                    database.ref(`users_vault/${currentUserPhone}/${folder}`).push({ name: file.name, url: fileUrl, timestamp: Date.now() });
                }
                bar.style.width = Math.round(((i + 1) / fileList.length) * 100) + "%";
            }
            setTimeout(() => { container.classList.add('hidden'); loadUserData(); }, 800);
        }

        function folderSelector(type) { return type.startsWith('image/') ? "photos" : "videos"; }

        function loadUserData() {
            if (!currentUserPhone) return;
            database.ref(`users_vault/${currentUserPhone}/${currentActiveTab}`).on('value', snapshot => {
                const grid = document.getElementById(`grid-${currentActiveTab}`); if (!grid) return; grid.innerHTML = '';
                activeDataSnapshot = snapshot.exists() ? snapshot.val() : {};
                if (!snapshot.exists()) { grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">No items found.</div>`; return; }
                
                Object.keys(activeDataSnapshot).forEach(key => {
                    const data = activeDataSnapshot[key], d = new Date(data.timestamp);
                    const timeFooter = `<div class="absolute bottom-0 left-0 right-0 bg-black/70 text-white text-[10px] px-2 py-1 flex justify-between"><span>${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span><span>${d.getHours() % 12 || 12}:${d.getMinutes().toString().padStart(2, '0')} ${d.getHours() >= 12 ? 'PM' : 'AM'}</span></div>`;
                    const check = `<span id="check-${key}" class="hidden absolute top-2 left-2 bg-blue-600 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center z-20"><i class="fa-solid fa-check"></i></span>`;

                    if (currentActiveTab === 'photos') {
                        grid.innerHTML += `<div id="card-${key}" class="asset-card relative aspect-square rounded-2xl overflow-hidden bg-black border" onclick="handleAssetClick(event,'photos','${key}','${data.url}','${data.name}')" oncontextmenu="handleAssetLongPress(event,'photos','${key}','${data.url}','${data.name}')">${check}<img src="${data.url}" class="w-full h-full object-cover pb-5">${timeFooter}</div>`;
                    } else {
                        // ویڈیو پلے ایبل ٹیمپلیٹ
                        grid.innerHTML += `<div id="card-${key}" class="asset-card relative aspect-video rounded-2xl overflow-hidden bg-black border" onclick="handleAssetClick(event,'videos','${key}','${data.url}','${data.name}')" oncontextmenu="handleAssetLongPress(event,'videos','${key}','${data.url}','${data.name}')">${check}<video src="${data.url}" class="w-full h-full object-cover pb-5" preload="metadata"></video><div class="absolute inset-0 flex items-center justify-center bottom-4"><span class="w-10 h-10 bg-white/90 rounded-full flex items-center justify-center text-blue-600 shadow-md"><i class="fa-solid fa-play"></i></span></div>${timeFooter}</div>`;
                    }
                });
            });
        }

        function viewPreview(url, type) {
            const modal = document.getElementById('preview-modal'), box = document.getElementById('preview-box');
            box.innerHTML = type === 'photo' ? `<img src="${url}" class="w-full h-full object-contain bg-black">` : `<video src="${url}" controls autoplay class="w-full h-full bg-black"></video>`;
            modal.classList.remove('hidden'); modal.classList.add('active');
        }
        function closePreviewModal() { document.getElementById('preview-modal').classList.remove('active'); document.getElementById('preview-box').innerHTML = ''; }
    </script>
</body>
</html>
