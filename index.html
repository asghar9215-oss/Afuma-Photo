<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAS PET Premium Gallery</title>
    
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase Stable Core SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- PDF Preview JS Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .asset-card.selected { border-color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 select-none">

    <!-- 1️⃣ Auth Section -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 to-indigo-100">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
            <div class="w-full flex justify-center mb-6">
                <img src="https://i.ibb.co/B2cJtFx4/75994.png" alt="Afuma Gallery Logo" class="w-48 h-auto object-contain rounded-2xl p-2">
            </div>
            <h2 id="auth-title" class="text-2xl font-bold mb-1 text-gray-800">Welcome Back</h2>
            <p id="auth-subtitle" class="text-gray-400 text-sm mb-6">Access your secure vault</p>
            <div class="space-y-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-phone"></i></span>
                    <input type="tel" id="auth-phone" placeholder="Enter Mobile Number" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="auth-password" placeholder="Password" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg transition active:scale-[0.98]">Login</button>
                <p id="auth-toggle" onclick="toggleAuthMode()" class="text-sm text-blue-500 font-medium cursor-pointer hover:underline">Don't have an account? Sign Up</p>
            </div>
        </div>
    </div>

    <!-- 2️⃣ Main App Dashboard -->
    <div id="app-section" class="hidden min-h-screen pb-24">
        
        <!-- Selection Context Bar -->
        <div id="selection-bar" class="hidden fixed top-0 left-0 right-0 bg-blue-600 text-white px-4 py-3 z-50 shadow-md flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="clearSelection()" class="text-white text-xl p-1"><i class="fa-solid fa-xmark"></i></button>
                <span id="selection-count" class="font-semibold text-sm">1 selected</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="selectAllCurrentTab()" class="text-xs font-semibold bg-blue-700 px-3 py-1.5 rounded-lg border border-blue-400 hover:bg-blue-800 transition">Select All</button>
                <button onclick="shareSelectedAssets()" class="text-lg p-2 hover:bg-blue-700 rounded-full transition"><i class="fa-solid fa-share-nodes"></i></button>
                <button onclick="deleteSelectedAssets()" class="text-lg p-2 hover:bg-red-600 rounded-full transition"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </div>

        <!-- Header Controls -->
        <header id="main-header" class="bg-white px-4 py-3 sticky top-0 shadow-sm flex justify-between items-center z-40 border-b border-gray-100">
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-xl p-1"><i class="fa-solid fa-right-from-bracket"></i></button>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">AAS PET Gallery</h1>
            <div class="flex items-center gap-2">
                <span id="network-status" class="text-xs px-2.5 py-1 rounded-full font-semibold bg-green-100 text-green-700 flex items-center gap-1"><i class="fa-solid fa-wifi"></i> Online</span>
                <button onclick="openCameraModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-2.5 rounded-full"><i class="fa-solid fa-camera"></i></button>
                <button onclick="document.getElementById('file-picker').click()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-full text-sm shadow-md flex items-center gap-1.5 transition"><i class="fa-solid fa-plus"></i> Upload</button>
                <input type="file" id="file-picker" accept="image/*,video/*,application/pdf" class="hidden" multiple onchange="uploadDispatcher(this.files)">
            </div>
        </header>

        <!-- Category Tabs -->
        <div class="bg-white shadow-sm flex justify-around p-3 sticky top-[57px] z-30 border-b border-gray-100">
            <button onclick="switchTab('photos')" id="tab-photos" class="flex flex-col items-center text-blue-600 font-semibold"><i class="fa-solid fa-image text-xl"></i><span class="text-xs mt-1">Photos</span></button>
            <button onclick="switchTab('videos')" id="tab-videos" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-video text-xl"></i><span class="text-xs mt-1">Videos</span></button>
            <button onclick="switchTab('pdfs')" id="tab-pdfs" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-file-pdf text-xl"></i><span class="text-xs mt-1">PDFs</span></button>
        </div>

        <div id="upload-progress-container" class="hidden bg-gray-200 h-1.5 w-full sticky top-[115px] z-30">
            <div id="upload-progress-bar" class="bg-blue-500 h-full w-0"></div>
        </div>

        <main class="p-4 max-w-4xl mx-auto">
            <div id="content-photos" class="tab-content active"><div id="grid-photos" class="grid grid-cols-3 gap-2 sm:gap-3"></div></div>
            <div id="content-videos" class="tab-content"><div id="grid-videos" class="grid grid-cols-2 gap-3"></div></div>
            <div id="content-pdfs" class="tab-content"><div id="grid-pdfs" class="grid grid-cols-1 gap-2"></div></div>
        </main>
    </div>

    <!-- Camera Modal -->
    <div id="camera-modal" class="modal fixed inset-0 bg-black z-50 flex-col justify-between hidden">
        <div class="flex justify-between items-center text-white w-full px-6 py-4 z-10 bg-gradient-to-b from-black/60 to-transparent absolute top-0 left-0">
            <button onclick="closeCameraModal()" class="text-2xl p-2"><i class="fa-solid fa-xmark"></i></button>
            <span id="camera-mode-status" class="font-semibold tracking-wide text-sm text-green-400">Photo Mode</span>
            <button onclick="switchCameraMode()" class="text-2xl p-2 text-white/90"><i class="fa-solid fa-camera-rotate"></i></button>
        </div>
        <div class="w-full h-full bg-black relative flex items-center justify-center">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover" muted></video>
            <canvas id="canvas" class="hidden"></canvas>
        </div>
        <div class="absolute bottom-0 left-0 right-0 flex flex-col items-center gap-4 pb-10 z-10 bg-gradient-to-t from-black/80 to-transparent">
            <div class="flex gap-6 text-white text-xs font-semibold tracking-wide">
                <button onclick="setCameraCaptureType('photo')" id="btn-mode-photo" class="text-blue-400 border-b-2 border-blue-400 pb-1 font-bold">PHOTO</button>
                <button onclick="setCameraCaptureType('video')" id="btn-mode-video" class="text-gray-400 pb-1">VIDEO</button>
            </div>
            <div class="flex justify-center items-center relative w-24 h-24">
                <button onclick="triggerCameraCapture()" id="capture-trigger-btn" class="w-16 h-16 bg-white rounded-full border-4 border-black/40 shadow-2xl"></button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal fixed inset-0 bg-black/95 z-50 items-center justify-center hidden p-4" onclick="closePreviewModal()">
        <div class="w-full max-w-2xl h-[85vh] flex items-center justify-center relative" onclick="event.stopPropagation()">
            <button onclick="closePreviewModal()" class="absolute -top-12 right-0 text-white text-3xl p-2"><i class="fa-solid fa-xmark"></i></button>
            <div id="preview-box" class="rounded-xl overflow-hidden shadow-2xl w-full h-full bg-white flex items-center justify-center"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const firebaseConfig = {
          apiKey: "AIzaSyACDb4rFTz7LraQOeehsrbuCjLWnmm12yI",
          authDomain: "afumaphoto.firebaseapp.com",
          databaseURL: "https://afumaphoto-default-rtdb.firebaseio.com",
          projectId: "afumaphoto"
        };
        const IMGBB_API_KEY = "66dcdf21e30733bfd85545d9fb5e76c4"; 

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let isSignUpMode = false, currentUserPhone = null, streamRef = null, currentFacingMode = "environment"; 
        let isOnline = navigator.onLine, selectedAssets = {}, currentActiveTab = "photos", activeDataSnapshot = {}; 
        let cameraCaptureMode = "photo", mediaRecorderRef = null, recordedChunks = [], recordingSeconds = 0, timerIntervalRef = null;

        window.onload = function() {
            const savedUser = localStorage.getItem("afuma_user_session");
            if (savedUser) { currentUserPhone = savedUser; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); loadUserData(); }
        };

        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Welcome Back"; document.getElementById('auth-btn').innerText = isSignUpMode ? "Sign Up" : "Login"; }

        function handleAuth() {
            const phone = document.getElementById('auth-phone').value.trim(), password = document.getElementById('auth-password').value.trim();
            if (!phone || !password) return alert("Please fill fields.");
            const cleanPhone = phone.replace(/[^0-9]/g, ""), virtualEmail = `${cleanPhone}@afuma.com`;
            if (isSignUpMode) {
                auth.createUserWithEmailAndPassword(virtualEmail, password).then(() => executeLoginSuccess(cleanPhone)).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(virtualEmail, password).then(() => executeLoginSuccess(cleanPhone)).catch(() => alert("Invalid credentials."));
            }
        }

        function executeLoginSuccess(phone) { currentUserPhone = phone; localStorage.setItem("afuma_user_session", phone); document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); loadUserData(); }
        function logout() { auth.signOut(); localStorage.removeItem("afuma_user_session"); window.location.reload(); }

        function switchTab(tabName) { currentActiveTab = tabName; clearSelection(); document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById('content-' + tabName).classList.add('active'); loadUserData(); }

        function handleAssetClick(event, folder, key, url, defaultName) { if (Object.keys(selectedAssets).length > 0) { event.preventDefault(); toggleAssetSelection(key, url, defaultName); } else { viewPreview(url, folder.substring(0, folder.length - 1), defaultName); } }
        function handleAssetLongPress(event, folder, key, url, defaultName) { event.preventDefault(); toggleAssetSelection(key, url, defaultName); }

        function toggleAssetSelection(key, url, defaultName) {
            const card = document.getElementById(`card-${key}`), checkbox = document.getElementById(`check-${key}`);
            if (selectedAssets[key]) {
                delete selectedAssets[key]; card.className = card.className.replace(/border-blue-600|bg-blue-50\/50/g, '').trim(); checkbox.classList.add('hidden');
            } else {
                selectedAssets[key] = { url: url, name: defaultName }; card.classList.add('border-blue-600', 'bg-blue-50/50'); checkbox.classList.remove('hidden');
            }
            renderSelectionBar();
        }

        function renderSelectionBar() { const count = Object.keys(selectedAssets).length; document.getElementById('selection-bar').classList.toggle('hidden', count === 0); document.getElementById('selection-count').innerText = `${count} Selected`; }
        function clearSelection() { Object.keys(selectedAssets).forEach(key => { const card = document.getElementById(`card-${key}`), checkbox = document.getElementById(`check-${key}`); if (card) card.className = card.className.replace(/border-blue-600|bg-blue-50\/50/g, '').trim(); if (checkbox) checkbox.classList.add('hidden'); }); selectedAssets = {}; renderSelectionBar(); }
        function selectAllCurrentTab() { Object.keys(activeDataSnapshot).forEach(key => { const data = activeDataSnapshot[key]; if (!selectedAssets[key]) toggleAssetSelection(key, data.url, data.name || "Asset"); }); }

        function deleteSelectedAssets() { if (confirm("Delete selected items?")) { Object.keys(selectedAssets).forEach(key => database.ref(`users_vault/${currentUserPhone}/${currentActiveTab}/${key}`).remove()); clearSelection(); } }

        async function shareSelectedAssets() {
            const keys = Object.keys(selectedAssets); if (keys.length === 0) return;
            let linkText = keys.map(k => selectedAssets[k].url).join('\n');
            if (window.AndroidShare) { window.AndroidShare.shareText(linkText); clearSelection(); } 
            else if (navigator.share) { navigator.share({ text: linkText }).then(() => clearSelection()); }
        }

        function getVideoDuration(file) { return new Promise((resolve) => { const video = document.createElement('video'); video.preload = 'metadata'; video.src = URL.createObjectURL(file); video.onloadedmetadata = () => { window.URL.revokeObjectURL(video.src); resolve(video.duration); }; video.onerror = () => resolve(0); }); }

        async function uploadDispatcher(fileList) {
            if (!fileList || fileList.length === 0 || !currentUserPhone) return;
            const container = document.getElementById('upload-progress-container'), bar = document.getElementById('upload-progress-bar');
            
            let filesToProcess = [];
            for (let i = 0; i < fileList.length; i++) {
                let file = fileList[i];
                if (file.type.startsWith('video/')) {
                    let duration = await getVideoDuration(file);
                    if (duration > 1200) { alert(`ویڈیو ۲۰ منٹ سے زیادہ ہے۔`); continue; }
                }
                filesToProcess.push(file);
            }
            if (filesToProcess.length === 0) return;
            container.classList.remove('hidden');

            for (let i = 0; i < filesToProcess.length; i++) {
                let file = filesToProcess[i], folder = folderSelector(file.type);
                if (folder === "photos") await uploadImageFreeSync(file); 
                else await uploadGenericFileFreeSync(file);
                bar.style.width = `${Math.round(((i + 1) / filesToProcess.length) * 100)}%`;
            }
            setTimeout(() => { container.classList.add('hidden'); switchTab(folderSelector(filesToProcess[0].type)); }, 800);
        }

        function uploadImageFreeSync(file) {
            return new Promise((resolve) => {
                const formData = new FormData(); formData.append("image", file);
                fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData })
                .then(res => res.json()).then(res => { if(res && res.success) database.ref(`users_vault/${currentUserPhone}/photos`).push({ name: file.name, url: res.data.url, timestamp: Date.now() }); resolve(); }).catch(() => resolve());
            });
        }

        // 🌟 فکسڈ لائف ٹائم فری ویڈیو اسٹریم ہوسٹنگ انجن
        function uploadGenericFileFreeSync(file) {
            return new Promise((resolve) => {
                let folder = folderSelector(file.type);
                const formData = new FormData();
                formData.append("file", file);

                fetch("https://pixeldrain.com/api/file", { method: "POST", body: formData })
                .then(res => res.json()).then(res => {
                    if(res && res.success) {
                        let streamUrl = "https://pixeldrain.com/api/file/" + res.id;
                        database.ref(`users_vault/${currentUserPhone}/${folder}`).push({ name: file.name, url: streamUrl, timestamp: Date.now() });
                    }
                    resolve();
                }).catch(() => resolve());
            });
        }

        function folderSelector(type) { if (type.startsWith('image/')) return "photos"; if (type.startsWith('video/')) return "videos"; return "pdfs"; }

        async function startCamera() {
            if (streamRef) streamRef.getTracks().forEach(track => track.stop());
            const videoElement = document.getElementById('webcam');
            
            // 🎙️ مائیک آڈیو لاک ایکٹیویشن اوپنر فکسڈ
            let constraints = { 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: true 
            };
            try {
                streamRef = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = streamRef;
                videoElement.onloadedmetadata = () => videoElement.play().catch(e => console.log(e));
            } catch (err) {
                try {
                    streamRef = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
                    videoElement.srcObject = streamRef;
                    videoElement.onloadedmetadata = () => videoElement.play().catch(e => console.log(e));
                } catch(e) { alert("Camera failed."); }
            }
        }

        function openCameraModal() { cameraCaptureMode = "photo"; setCameraCaptureType('photo'); document.getElementById('camera-modal').classList.add('active'); startCamera(); }
        function switchCameraMode() { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; startCamera(); }
        function closeCameraModal() { stopTimer(); if (mediaRecorderRef && mediaRecorderRef.state !== "inactive") mediaRecorderRef.stop(); if (streamRef) streamRef.getTracks().forEach(track => track.stop()); document.getElementById('camera-modal').classList.remove('active'); }

        function setCameraCaptureType(mode) {
            cameraCaptureMode = mode;
            const btnPhoto = document.getElementById('btn-mode-photo'), btnVideo = document.getElementById('btn-mode-video');
            const triggerBtn = document.getElementById('capture-trigger-btn'), statusLabel = document.getElementById('camera-mode-status');
            if(mode === 'photo') {
                btnPhoto.className = "text-blue-400 border-b-2 border-blue-400 pb-1 font-bold"; btnVideo.className = "text-gray-400 pb-1";
                triggerBtn.className = "w-16 h-16 bg-white rounded-full border-4 border-black/40 shadow-2xl"; statusLabel.innerText = "Photo Mode"; statusLabel.className = "text-green-400 text-sm font-bold";
            } else {
                btnVideo.className = "text-red-500 border-b-2 border-red-500 pb-1 font-bold"; btnPhoto.className = "text-gray-400 pb-1";
                triggerBtn.className = "w-16 h-16 bg-red-600 rounded-full border-4 border-white/60 shadow-2xl"; statusLabel.innerText = "Video Mode"; statusLabel.className = "text-red-500 text-sm font-bold";
            }
        }

        function triggerCameraCapture() {
            if (cameraCaptureMode === "photo") { capturePhoto(); } 
            else {
                if (mediaRecorderRef && mediaRecorderRef.state === "recording") { mediaRecorderRef.stop(); stopTimer(); document.getElementById('camera-mode-status').innerText = "Processing..."; } 
                else { startVideoRecording(); }
            }
        }

        function capturePhoto() {
            const video = document.getElementById('webcam'), canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => { const file = new File([blob], `Snap_${Date.now()}.jpg`, { type: "image/jpeg" }); closeCameraModal(); uploadDispatcher([file]); }, 'image/jpeg');
        }

        function startTimer() { recordingSeconds = 0; const label = document.getElementById('camera-mode-status'); timerIntervalRef = setInterval(() => { recordingSeconds++; const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0'), secs = (recordingSeconds % 60).toString().padStart(2, '0'); label.innerText = `🔴 REC ${mins}:${secs}`; }, 1000); }
        function stopTimer() { if (timerIntervalRef) { clearInterval(timerIntervalRef); timerIntervalRef = null; } }

        function startVideoRecording() {
            recordedChunks = []; const triggerBtn = document.getElementById('capture-trigger-btn');
            let options = { mimeType: 'video/webm;codecs=vp9,opus' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'video/mp4;codecs=avc1.42E01E,mp4a.40.2' }; }
            try {
                mediaRecorderRef = new MediaRecorder(streamRef, options);
                mediaRecorderRef.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorderRef.onstop = () => { const blob = new Blob(recordedChunks, { type: 'video/mp4' }); const file = new File([blob], `Cam_${Date.now()}.mp4`, { type: 'video/mp4' }); closeCameraModal(); uploadDispatcher([file]); };
                mediaRecorderRef.start(); startTimer(); triggerBtn.className = "w-12 h-12 bg-red-700 rounded-lg border-2 border-white shadow-2xl transition-all";
            } catch (e) { alert("Recording failed."); }
        }

        function loadUserData() {
            if (!currentUserPhone) return;
            database.ref(`users_vault/${currentUserPhone}/${currentActiveTab}`).on('value', snapshot => {
                const grid = document.getElementById(`grid-${currentActiveTab}`); if (!grid) return; grid.innerHTML = '';
                activeDataSnapshot = snapshot.exists() ? snapshot.val() : {};
                if (!snapshot.exists()) { grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">No items found.</div>`; return; }
                buildUiGridElements(activeDataSnapshot, currentActiveTab, grid);
            });
        }

        function formatTimestampToDateTime(ts) { const d = new Date(ts); return { date: `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`, time: `${d.getHours() % 12 || 12}:${d.getMinutes().toString().padStart(2, '0')} ${d.getHours() >= 12 ? 'PM' : 'AM'}` }; }

        function buildUiGridElements(dataObject, folder, gridContainer) {
            Object.keys(dataObject).forEach(key => {
                const data = dataObject[key], timeData = formatTimestampToDateTime(data.timestamp);
                const footer = `<div class="absolute bottom-0 left-0 right-0 bg-black/70 text-white text-[10px] px-2 py-1 flex justify-between items-center z-10"><span>${timeData.date}</span><span>${timeData.time}</span></div>`;
                const check = `<span id="check-${key}" class="hidden absolute top-2 left-2 bg-blue-600 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center z-20"><i class="fa-solid fa-check"></i></span>`;

                if (folder === 'photos') {
                    gridContainer.innerHTML += `<div id="card-${key}" class="asset-card relative aspect-square rounded-2xl overflow-hidden border bg-gray-200" onclick="handleAssetClick(event, '${folder}', '${key}', '${data.url}', '${data.name}')" oncontextmenu="handleAssetLongPress(event, '${folder}', '${key}', '${data.url}', '${data.name}')">${check}<img src="${data.url}" class="w-full h-full object-cover pb-5 bg-black">${footer}</div>`;
                } else if (folder === 'videos') {
                    gridContainer.innerHTML += `<div id="card-${key}" class="asset-card relative aspect-video rounded-2xl overflow-hidden border bg-black" onclick="handleAssetClick(event, '${folder}', '${key}', '${data.url}', '${data.name}')" oncontextmenu="handleAssetLongPress(event, '${folder}', '${key}', '${data.url}', '${data.name}')">${check}<video src="${data.url}" class="w-full h-full object-cover block pb-6" controls playsinline></video>${footer}</div>`;
                } else {
                    gridContainer.innerHTML += `<div id="card-${key}" class="asset-card flex flex-col p-3 bg-white rounded-2xl border shadow-sm w-full relative min-h-[85px]" onclick="handleAssetClick(event, '${folder}', '${key}', '${data.url}', '${data.name}')" oncontextmenu="handleAssetLongPress(event, '${folder}', '${key}', '${data.url}', '${data.name}')">${check}<div class="flex items-center gap-3 min-w-0 pb-6"><i class="fa-solid fa-file-pdf text-red-500 text-2xl flex-shrink-0"></i><span class="text-sm font-semibold text-gray-700 truncate max-w-[220px]">${data.name}</span></div>${footer}</div>`;
                }
            });
        }

        function viewPreview(url, type, fileName) { if (type === 'photo') { const modal = document.getElementById('preview-modal'), box = document.getElementById('preview-box'); box.innerHTML = `<img src="${url}" class="w-full h-full object-contain bg-black">`; modal.classList.remove('hidden'); modal.classList.add('active'); } else { window.open(url, '_blank'); } }
        function closePreviewModal() { document.getElementById('preview-modal').classList.remove('active'); }
    </script>
</body>
</html>
